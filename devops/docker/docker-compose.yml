version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: landiq_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: landiq_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./landiq.db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: local-dev-secret-key-change-in-production-32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DEBUG: "true"
      MODELS_DIR: /app/../models
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    volumes:
      - ../backend:/app
      - ../models:/app/../models
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: landiq_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: landiq_network
