apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  labels:
    app: ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
        - name: ai-engine
          image: ${ECR_REGISTRY}/land-intelligence-ai-engine:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /app/data/model_registry
          volumeMounts:
            - name: model-storage
              mountPath: /app/data/model_registry
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine-service
spec:
  selector:
    app: ai-engine
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
