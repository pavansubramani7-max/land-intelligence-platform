version: "3.9"

services:
  mongodb:
    image: mongo:6
    container_name: land_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: land_intelligence
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: land_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: ../devops/docker/Dockerfile.ai_engine
    container_name: land_ai_engine
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/data/model_registry
      PORT: 8000
    volumes:
      - ./ai_engine:/app
      - ai_models:/app/data/model_registry
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../devops/docker/Dockerfile.backend
    container_name: land_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/land_intelligence
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai_engine:8000
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_prod}
      JWT_EXPIRY: 7d
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    command: npm run dev
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai_engine:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../devops/docker/Dockerfile.frontend
    container_name: land_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: land_nginx
    ports:
      - "80:80"
    volumes:
      - ./devops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai_engine

volumes:
  mongo_data:
  ai_models:
  uploads:
