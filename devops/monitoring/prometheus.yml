global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["backend:5000"]
    metrics_path: /metrics

  - job_name: "ai_engine"
    static_configs:
      - targets: ["ai_engine:8000"]
    metrics_path: /metrics

  - job_name: "mongodb"
    static_configs:
      - targets: ["mongodb:27017"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
